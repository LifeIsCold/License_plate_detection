services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-parking_db}
    volumes:
      - lpd_mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-changeme}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  web:
    build: .
    ports:
      - "${LPD_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      PLATE_MODEL_PATH: /app/models/plate_detection.pt
      HF_HOME: /app/.cache/huggingface
      TORCH_HOME: /app/.cache/torch
    volumes:
      - ./models:/app/models:ro
      - lpd_uploads:/app/backend/uploads
      - lpd_model_cache:/app/.cache
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lpd_mysql_data:
  lpd_uploads:
  lpd_model_cache:
